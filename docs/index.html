<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Timesheet</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#111111">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Timesheet">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <button id="googleSignInBtn">Sign in to Google</button>
    <button id="syncDownBtn" disabled>Sync down (load)</button>
    <button id="syncUpBtn" disabled>Sync up (save)</button>
    <span id="syncStatus"></span>

  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 18px;
      line-height: 1.35;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    .card {
      border: 1px solid rgba(127,127,127,.35);
      border-radius: 16px;
      padding: 14px;
    }
    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    h1 { font-size: 1.25rem; margin: 0; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    select, input, button {
      font: inherit;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(127,127,127,.35);
      background: transparent;
    }
    button { cursor: pointer; }
    button.primary {
      border: 0;
      background: rgba(127,127,127,.18);
      font-weight: 600;
    }
    .tableWrap { overflow: auto; border-radius: 12px; border: 1px solid rgba(127,127,127,.25); }
    table { width: 100%; border-collapse: collapse; min-width: 860px; }
    th, td { padding: 10px 10px; border-bottom: 1px solid rgba(127,127,127,.18); }
    th { text-align: left; position: sticky; top: 0; background: rgba(20,20,20,.65); backdrop-filter: blur(6px); }
    td input, td select { width: 100%; box-sizing: border-box; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { opacity: .75; font-size: .95rem; }
    .footer {
      display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
      padding-top: 12px;
      align-items: center;
    }
    .totalBox {
      border: 1px solid rgba(127,127,127,.35);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .hint { font-size: .9rem; opacity: .8; }
    .pill {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      border: 1px solid rgba(127,127,127,.35);
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <div class="topbar">
      <div>
        <h1>Timesheet</h1>
        <div class="muted">Saved on this device • Works offline</div>
      </div>

      <div class="controls">
        <span class="pill" id="statusPill">Loading…</span>

        <label class="muted" for="monthSel">Month:</label>
        <select id="monthSel"></select>

        <button class="primary" id="newMonthBtn" title="Create a new month based on the selected month">New month</button>
        <button id="exportBtn" title="Export current month as JSON">Export</button>
        <button id="resetBtn" title="Reset current month data">Reset</button>
      </div>
    </div>

    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th style="width: 120px;">Date</th>
            <th style="width: 80px;">Day</th>
            <th style="width: 120px;">Start</th>
            <th style="width: 120px;">End</th>
            <th style="width: 140px;">Duty</th>
            <th style="width: 120px;">Lunch (hrs)</th>
            <th style="width: 110px; text-align:right;">Hours</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer">
      <div class="hint">
        Tip: use <b>Start</b>/<b>End</b> time pickers. Hours auto-calculate as <code>End - Start - Lunch</code>.
      </div>
      <div class="totalBox" id="totalBox">Total: 0.00</div>
    </div>
  </div>
</div>

<script>
  // ======= Storage shape =======
  // key: "timesheet:v1"
  // data: { months: { "2025-11": { rows: [...] } }, monthOrder: ["2025-11", ...] }
  const STORE_KEY = "timesheet:v1";
  const DUTIES = ["", "Bake", "Kitchen", "Other"];

  const statusPill = document.getElementById("statusPill");
  const monthSel = document.getElementById("monthSel");
  const tbody = document.getElementById("tbody");
  const totalBox = document.getElementById("totalBox");
  const exportBtn = document.getElementById("exportBtn");
  const resetBtn = document.getElementById("resetBtn");
  const newMonthBtn = document.getElementById("newMonthBtn");

  const fmt2 = (n) => (Math.round(n * 100) / 100).toFixed(2);

  function setStatus(ok, text) {
    statusPill.textContent = text;
    statusPill.style.color = ok ? "#0a7a2f" : "#b00020";
  }

  function pad2(n){ return String(n).padStart(2,"0"); }

    // generates ["05:00","05:15",...,"19:00"]
    function buildTimeOptions(startHH=5, endHH=19, stepMin=15) {
    const out = [""];
    for (let h = startHH; h <= endHH; h++) {
        for (let m = 0; m < 60; m += stepMin) {
        if (h === endHH && m > 0) break; // stop at 19:00 exactly
        out.push(`${pad2(h)}:${pad2(m)}`);
        }
    }
    return out;
    }
    const TIME_OPTS = buildTimeOptions(5, 19, 15);

  function loadStore() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch {
      return null;
    }
  }

  function saveStore(store) {
    localStorage.setItem(STORE_KEY, JSON.stringify(store));
  }

  function ymd(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${dd}`;
  }

  function monthKeyFromDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    return `${y}-${m}`;
  }

  function daysInMonth(y, m1to12) {
    return new Date(y, m1to12, 0).getDate();
  }

  function weekdayShort(d) {
    return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
  }

  // time strings "HH:MM" -> minutes
  function toMinutes(hhmm) {
    if (!hhmm) return null;
    const [h, m] = hhmm.split(":").map(Number);
    if (!Number.isFinite(h) || !Number.isFinite(m)) return null;
    return h * 60 + m;
  }

  function calcHours(startHHMM, endHHMM, lunchHours) {
    const s = toMinutes(startHHMM);
    const e = toMinutes(endHHMM);
    const lunch = Number(lunchHours || 0);
    if (s === null || e === null) return 0;

    // same-day by default; if end < start assume overnight shift
    let diff = e - s;
    if (diff < 0) diff += 24 * 60;

    const hours = diff / 60 - lunch;
    return hours > 0 ? hours : 0;
  }

  function makeBlankMonth(monthKey) {
    const [yStr, mStr] = monthKey.split("-");
    const y = Number(yStr);
    const m = Number(mStr); // 1..12
    const n = daysInMonth(y, m);

    const rows = [];
    for (let day = 1; day <= n; day++) {
      const d = new Date(y, m - 1, day);
      rows.push({
        date: ymd(d),              // YYYY-MM-DD
        day: weekdayShort(d),      // Mon, Tue...
        start: "",                 // HH:MM
        end: "",                   // HH:MM
        duty: "",
        lunch: "0.5",
      });
    }
    return { rows };
  }

  function ensureInit() {
    let store = loadStore();
    if (!store) {
      const now = new Date();
      const mk = monthKeyFromDate(now);
      store = { months: {}, monthOrder: [] };
      store.months[mk] = makeBlankMonth(mk);
      store.monthOrder.push(mk);
      saveStore(store);
    }
    return store;
  }

  function renderMonthOptions(store, selected) {
    monthSel.innerHTML = "";
    for (const mk of store.monthOrder) {
      const opt = document.createElement("option");
      opt.value = mk;
      opt.textContent = mk;
      if (mk === selected) opt.selected = true;
      monthSel.appendChild(opt);
    }
  }

  function renderTable(store, mk) {
    const month = store.months[mk];
    if (!month) return;

    tbody.innerHTML = "";

    month.rows.forEach((row, idx) => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td><input type="date" value="${row.date}"></td>
        <td>${row.day}</td>
        <td>
        <select data-start>
            ${TIME_OPTS.map(t => `<option value="${t}" ${t===row.start?"selected":""}>${t}</option>`).join("")}
        </select>
        </td>
        <td>
        <select data-end>
            ${TIME_OPTS.map(t => `<option value="${t}" ${t===row.end?"selected":""}>${t}</option>`).join("")}
        </select>
        </td>
        <td>
          <select>${DUTIES.map(d => `<option ${d===row.duty?"selected":""}>${d}</option>`).join("")}</select>
        </td>
        <td><input type="number" step="0.25" min="0" value="${row.lunch ?? "0"}"></td>
        <td class="num" data-hours>0.00</td>
      `;

      const dateEl  = tr.children[0].querySelector("input");
      const startEl = tr.querySelector("[data-start]");
      const endEl   = tr.querySelector("[data-end]");
      const dutyEl  = tr.children[4].querySelector("select");
      const lunchEl = tr.children[5].querySelector("input");
      const hoursTd = tr.querySelector("[data-hours]");

      function syncDayFromDate() {
        const d = new Date(dateEl.value + "T00:00:00");
        row.day = weekdayShort(d);
        tr.children[1].textContent = row.day;
      }

      function updateHoursAndSave() {
        const h = calcHours(row.start, row.end, row.lunch);
        hoursTd.textContent = fmt2(h);
        saveStore(store);
        renderTotal(store, mk);
        setStatus(true, "Saved");
      }

      // init hours
      hoursTd.textContent = fmt2(calcHours(row.start, row.end, row.lunch));

      // listeners
      dateEl.addEventListener("change", () => {
        row.date = dateEl.value;
        syncDayFromDate();
        updateHoursAndSave();
      });

      startEl.addEventListener("change", () => { row.start = startEl.value; updateHoursAndSave(); });
      endEl.addEventListener("change", () => { row.end = endEl.value; updateHoursAndSave(); });
      dutyEl.addEventListener("change", () => { row.duty = dutyEl.value; updateHoursAndSave(); });
      lunchEl.addEventListener("change", () => { row.lunch = lunchEl.value; updateHoursAndSave(); });

      tbody.appendChild(tr);
    });

    renderTotal(store, mk);
  }

  function renderTotal(store, mk) {
    const month = store.months[mk];
    let total = 0;
    for (const r of month.rows) total += calcHours(r.start, r.end, r.lunch);
    totalBox.textContent = `Total: ${fmt2(total)}`;
  }

  function addNextMonth(store, baseMk) {
    const [yStr, mStr] = baseMk.split("-");
    let y = Number(yStr);
    let m = Number(mStr); // 1..12
    m += 1;
    if (m === 13) { m = 1; y += 1; }
    const nextMk = `${y}-${String(m).padStart(2,"0")}`;

    if (!store.months[nextMk]) {
      store.months[nextMk] = makeBlankMonth(nextMk);
      store.monthOrder.push(nextMk);
      saveStore(store);
    }
    return nextMk;
  }

  // ======= App boot =======
  let store = ensureInit();
  let currentMonth = store.monthOrder[store.monthOrder.length - 1];

  renderMonthOptions(store, currentMonth);
  renderTable(store, currentMonth);
  setStatus(true, "Ready");

  monthSel.addEventListener("change", () => {
    currentMonth = monthSel.value;
    renderTable(store, currentMonth);
    setStatus(true, "Ready");
  });

  newMonthBtn.addEventListener("click", () => {
    store = ensureInit();
    currentMonth = addNextMonth(store, currentMonth);
    renderMonthOptions(store, currentMonth);
    renderTable(store, currentMonth);
    setStatus(true, "Created");
  });

  exportBtn.addEventListener("click", async () => {
    const data = store.months[currentMonth];
    const blob = new Blob([JSON.stringify({ month: currentMonth, ...data }, null, 2)], { type: "application/json" });
    const fileName = `timesheet-${currentMonth}.json`;

    // iOS may not support showSaveFilePicker; use share if possible
    if (navigator.share) {
      try {
        await navigator.share({ title: fileName, text: "Timesheet export", files: [new File([blob], fileName, { type: "application/json" })] });
        setStatus(true, "Exported");
        return;
      } catch {}
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
    setStatus(true, "Exported");
  });

  resetBtn.addEventListener("click", () => {
    if (!confirm(`Reset ${currentMonth} data?`)) return;
    store.months[currentMonth] = makeBlankMonth(currentMonth);
    saveStore(store);
    renderTable(store, currentMonth);
    setStatus(true, "Reset");
  });

  // Register SW
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }

  // ====== CONFIG ======
const GOOGLE_CLIENT_ID = "644218233242-sst0d01r547bq1lmuuf3inls19foetet.apps.googleusercontent.com";
const SPREADSHEET_ID = "1FTzC7-1Eqj7G-y7fiG6Hq8EIk24EwCC_IQIo0qFZglY";
const SHEET_NAME = "Data"; // <-- set to your tab name exactly
const SCOPES = "https://www.googleapis.com/auth/spreadsheets"; // read+write
const SHEET_HEADER = ["month", "date", "start", "end", "duty", "lunch", "hours", "updatedAt"];

let accessToken = null;
let tokenClient = null;

const signInBtn = document.getElementById("googleSignInBtn");
const syncDownBtn = document.getElementById("syncDownBtn");
const syncUpBtn = document.getElementById("syncUpBtn");
const syncStatus = document.getElementById("syncStatus");

function setSyncStatus(t) { syncStatus.textContent = t; }
function setSyncEnabled(enabled) {
  syncDownBtn.disabled = !enabled;
  syncUpBtn.disabled = !enabled;
}

function initGoogleTokenClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      accessToken = resp.access_token;
      setSyncStatus("Signed in ✅");
      setSyncEnabled(true);
    },
  });
}

window.addEventListener("load", () => {
  initGoogleTokenClient();
});

signInBtn.addEventListener("click", () => {
  setSyncStatus("Signing in…");
  tokenClient.requestAccessToken({ prompt: "consent" });
});

// Helper for calling Sheets API
async function sheetsFetch(path, options = {}) {
  if (!accessToken) throw new Error("Not signed in");
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/${path}`, {
    ...options,
    headers: {
      "Authorization": `Bearer ${accessToken}`,
      "Content-Type": "application/json",
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Sheets API error ${res.status}: ${text}`);
  }
  return res.json();
}

function hasHeaderRow(values) {
  const firstRow = values[0] || [];
  return SHEET_HEADER.every((h, i) => String(firstRow[i] || "").toLowerCase() === h);
}

async function ensureHeaderRow(values) {
  if (values.length) return values;
  const headerRange = encodeURIComponent(`${SHEET_NAME}!A1:H1`);
  await sheetsFetch(`values/${headerRange}?valueInputOption=RAW`, {
    method: "PUT",
    body: JSON.stringify({ values: [SHEET_HEADER] })
  });
  return [SHEET_HEADER];
}

// ====== YOUR APP HOOKS ======
// Implement these two functions in your app:
// - getMonthDataForSync(monthKey) -> array of row objects for that month
// - applyMonthDataFromSync(monthKey, rows) -> update your local storage/table

// Example row object shape:
// { month:"2026-03", date:"2026-03-01", start:"08:15", end:"14:45", duty:"Kitchen", lunch:"0.5", hours:"5.75" }

function getMonthDataForSync(monthKey) {
  const month = store.months[monthKey];
  if (!month?.rows) return [];
  return month.rows
    .filter(r => r.date)
    .map(r => ({
      month: monthKey,
      date: r.date || "",
      start: r.start || "",
      end: r.end || "",
      duty: r.duty || "",
      lunch: r.lunch ?? "",
      hours: fmt2(calcHours(r.start, r.end, r.lunch))
    }));
}

function applyMonthDataFromSync(monthKey, rows) {
  if (!store.months[monthKey]) {
    store.months[monthKey] = makeBlankMonth(monthKey);
    if (!store.monthOrder.includes(monthKey)) store.monthOrder.push(monthKey);
  }

  const month = store.months[monthKey];
  const rowByDate = new Map(rows.map(r => [r.date, r]));

  month.rows = month.rows.map(localRow => {
    const incoming = rowByDate.get(localRow.date);
    if (!incoming) return localRow;
    return {
      ...localRow,
      start: incoming.start || "",
      end: incoming.end || "",
      duty: incoming.duty || "",
      lunch: incoming.lunch ?? localRow.lunch ?? "0.5",
      day: weekdayShort(new Date(localRow.date + "T00:00:00"))
    };
  });

  saveStore(store);
  renderMonthOptions(store, monthKey);
  currentMonth = monthKey;
  renderTable(store, monthKey);
}

// ====== SYNC DOWN: load month from sheet ======
syncDownBtn.addEventListener("click", async () => {
  try {
    const monthKey = document.getElementById("monthSel")?.value || ""; // if you have month dropdown
    setSyncStatus("Loading…");

    const range = encodeURIComponent(`${SHEET_NAME}!A:H`);
    const data = await sheetsFetch(`values/${range}`);
    const values = data.values || [];
    const body = hasHeaderRow(values) ? values.slice(1) : values;
    const filtered = body
      .filter(r => (r[0] || "") === monthKey)
      .map(r => ({
        month: r[0] || "",
        date: r[1] || "",
        start: r[2] || "",
        end: r[3] || "",
        duty: r[4] || "",
        lunch: r[5] || "",
        hours: r[6] || "",
        updatedAt: r[7] || ""
      }));

    applyMonthDataFromSync(monthKey, filtered);
    setSyncStatus("Loaded ✅");
  } catch (e) {
    setSyncStatus(String(e.message || e));
  }
});

// ====== SYNC UP: upsert month rows into sheet ======
syncUpBtn.addEventListener("click", async () => {
  try {
    const monthKey = document.getElementById("monthSel")?.value || "";
    setSyncStatus("Saving…");

    // 1) Read entire sheet to find existing rows for that month+date
    const rangeAll = encodeURIComponent(`${SHEET_NAME}!A:H`);
    const data = await sheetsFetch(`values/${rangeAll}`);
    const values = await ensureHeaderRow(data.values || []);
    const headerExists = hasHeaderRow(values);
    const body = headerExists ? values.slice(1) : values;

    // Map existing row -> sheet row index (1-based in Sheets; header is row 1)
    const indexByKey = new Map();
    const firstDataRowIndex = headerExists ? 2 : 1;
    body.forEach((r, i) => {
      const m = r[0] || "";
      const d = r[1] || "";
      if (m && d) indexByKey.set(`${m}|${d}`, i + firstDataRowIndex);
    });

    // 2) Upsert each local row
    const localRows = getMonthDataForSync(monthKey);
    if (!localRows.length) {
      setSyncStatus("No rows to save for this month");
      return;
    }
    const now = new Date().toISOString();

    for (const row of localRows) {
      if (!row.date) continue;
      const key = `${monthKey}|${row.date}`;
      const sheetRowIndex = indexByKey.get(key);

      const rowValues = [[
        monthKey,
        row.date,
        row.start || "",
        row.end || "",
        row.duty || "",
        row.lunch ?? "",
        row.hours ?? "",
        now
      ]];

      if (sheetRowIndex) {
        // Update existing row A:H at that row index
        const updateRange = encodeURIComponent(`${SHEET_NAME}!A${sheetRowIndex}:H${sheetRowIndex}`);
        await sheetsFetch(`values/${updateRange}?valueInputOption=USER_ENTERED`, {
          method: "PUT",
          body: JSON.stringify({ values: rowValues })
        });
      } else {
        // Append new row
        const appendRange = encodeURIComponent(`${SHEET_NAME}!A:H`);
        await sheetsFetch(`values/${appendRange}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`, {
          method: "POST",
          body: JSON.stringify({ values: rowValues })
        });
      }
    }

    setSyncStatus(`Saved ✅ (${localRows.length} rows)`);
  } catch (e) {
    setSyncStatus(String(e.message || e));
  }
});
</script>
</body>
</html>
